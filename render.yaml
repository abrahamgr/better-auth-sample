services:
  - type: web
    name: better-auth-sample
    env: node
    plan: free
    region: virginia # Ensure both service and DB are in the same region
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm --filter=./apps/web run db:migrate && pnpm start
    envVars:
      # 1. Automatic DB connection string assignment
      - key: DATABASE_URL
        fromDatabase:
          name: better-auth-sample-db
          property: connectionString

      # 2. Hardcoded public configurations
      - key: NODE_ENV
        value: production

      # 3. Secret placeholders (Render will prompt you for these on the first build)
      - key: APP_URL
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: EMAIL_FROM
        value: 'Better Auth Sample <noreply@abrahamgr.dev>'
      - key: RESEND_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

databases:
  - name: better-auth-sample-db
    plan: free
    region: virginia